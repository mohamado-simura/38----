<div id="custDownloadsSimple">
  <style>
    /* Scoped styles only inside #custDownloadsSimple */
    #custDownloadsSimple{
      background:#fff;
      position:relative;
      overflow:hidden;
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: clamp(18px, 4vw, 44px) clamp(12px, 3vw, 24px);
      font-family: Arial, Helvetica, sans-serif;
    }

    /* Pearls (visible) */
    #custDownloadsSimple .pearl{
      position:absolute;
      border-radius:50%;
      background:
        radial-gradient(circle at 28% 24%,
          rgba(255,255,255,1) 0%,
          rgba(255,255,255,0.98) 18%,
          rgba(245,245,245,0.92) 28%,
          rgba(230,230,230,0.70) 45%,
          rgba(210,210,210,0.35) 62%,
          rgba(255,255,255,0) 78%),
        radial-gradient(circle at 55% 55%,
          rgba(210,235,255,0.22) 0%,
          rgba(255,220,240,0.14) 35%,
          rgba(255,255,255,0) 70%);
      box-shadow:
        0 20px 45px rgba(0,0,0,0.14),
        0 0 0 1px rgba(0,0,0,0.06),
        inset 0 16px 26px rgba(255,255,255,0.95),
        inset 0 -18px 26px rgba(0,0,0,0.07);
      opacity:0.92;
      animation: floatPearl 10s ease-in-out infinite;
      pointer-events:none;
    }
    #custDownloadsSimple .p1{ left:24px; top:84px; width:140px; height:140px; animation-delay:0s; }
    #custDownloadsSimple .p2{ right:34px; top:44px; width:115px; height:115px; animation-delay:1.8s; }
    #custDownloadsSimple .p3{ left:10%; bottom:60px; width:125px; height:125px; animation-delay:3.2s; opacity:0.88; }
    #custDownloadsSimple .p4{ right:16%; bottom:22%; width:100px; height:100px; animation-delay:4.6s; opacity:0.85; }
    #custDownloadsSimple .p5{ left:58%; top:18%; width:90px; height:90px; animation-delay:2.4s; opacity:0.82; }

    #custDownloadsSimple .shimmer{
      position:absolute;
      inset:-40%;
      background: linear-gradient(120deg,
        rgba(255,255,255,0) 36%,
        rgba(240,240,240,0.90) 50%,
        rgba(255,255,255,0) 64%);
      transform: translateX(-40%) rotate(8deg);
      animation: shimmerSweep 6.8s linear infinite;
      opacity:0.50;
      pointer-events:none;
    }

    @keyframes floatPearl{
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(14px,-12px) scale(1.04); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes shimmerSweep{
      0%   { transform: translateX(-45%) rotate(8deg); }
      100% { transform: translateX(45%) rotate(8deg); }
    }

    /* Card */
    #custDownloadsSimple .card{
      width: min(900px, 100%);
      background: rgba(255,255,255,0.95);
      border:1px solid rgba(0,0,0,0.10);
      border-radius:18px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.08);
      position:relative;
      z-index:2;
      padding: clamp(18px, 4vw, 28px);
    }

    #custDownloadsSimple .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    #custDownloadsSimple .hello{
      font-weight:900;
      letter-spacing:1px;
      font-size: clamp(16px, 3vw, 20px);
      margin:0;
    }
    #custDownloadsSimple .sub{
      margin:6px 0 0;
      color:#666;
      font-size: clamp(12px, 2.6vw, 13px);
      line-height:1.4;
    }

    #custDownloadsSimple .btn{
      border:1px solid #111;
      background:#fff;
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      white-space:nowrap;
    }

    /* Sections */
    #custDownloadsSimple .section{
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
    #custDownloadsSimple h2{
      margin:0 0 10px;
      font-size: clamp(15px, 3vw, 18px);
      letter-spacing:1px;
    }
    #custDownloadsSimple ul{
      margin:0;
      padding-left:18px;
      line-height:2;
      font-size: clamp(13px, 2.7vw, 15px);
    }
    #custDownloadsSimple a{
      color:#111;
      text-decoration:underline;
      font-weight:800;
      word-break: break-word;
    }
  </style>

  <div class="pearl p1"></div>

  <div class="pearl p3"></div>
  <div class="pearl p4"></div>
  <div class="pearl p5"></div>
  <div class="shimmer"></div>

  <div class="card">

  <script>
    (function(){
      /* CHANGE THIS: your login page slug */
      const LOGIN_URL = window.location.origin + "/customer-login/";

      /* Block access unless logged in */
      if (sessionStorage.getItem("customerLoggedIn") !== "yes") {
        window.location.replace(LOGIN_URL);
        return;
      }


      /* Logout */
      document.getElementById("logoutBtn").addEventListener("click", function(){
        sessionStorage.removeItem("customerLoggedIn");
        sessionStorage.removeItem("customerUserId");
        window.location.replace(LOGIN_URL);
      });
    })();
  </script>
