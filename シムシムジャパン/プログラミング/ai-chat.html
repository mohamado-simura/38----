<!-- ================================
AIヘナカラーカウンセラー（日本語コメント付き）
================================ -->
<div class="ai-henna-box">
  <h3>AIヘナカラーカウンセラー</h3>
  <p>年齢・髪の長さ・髪質・太さを入力すると、<br>あなたに合ったヘナカラーと配合比率を診断します。</p>

  <!-- 入力項目：年齢 -->
  <label>年齢:</label>
  <input type="number" id="age" placeholder="例: 35">

  <!-- 入力項目：髪の長さ -->
  <label>髪の長さ:</label>
  <select id="length">
    <option value="">選択してください</option>
    <option value="short">ショート</option>
    <option value="medium">ミディアム</option>
    <option value="long">ロング</option>
  </select>

  <!-- 入力項目：髪色・髪質 -->
  <label>髪質・髪色:</label>
  <select id="type">
    <option value="">選択してください</option>
    <option value="black">ブラック</option>
    <option value="softblack">ソフトブラック</option>
    <option value="brown">ブラウン</option>
    <option value="darkbrown">ダークブラウン</option>
    <option value="gray">グレイ・白髪混じり</option>
  </select>

  <!-- 入力項目：髪の太さ -->
  <label>髪の太さ:</label>
  <select id="thickness">
    <option value="">選択してください</option>
    <option value="thin">細い</option>
    <option value="normal">普通</option>
    <option value="thick">太い</option>
  </select>

  <!-- AI診断ボタン -->
  <button type="button" onclick="recommendHenna()">診断する</button>

  <!-- 結果表示エリア -->
  <div id="resultLine" class="result-line" hidden></div>
</div>

<!-- ================================
スタイル（見た目のデザイン設定）
================================ -->
<style>
.ai-henna-box {
  background: #fff;
  border-radius: 10px;
  border: 1px solid #e5d3b8;
  padding: 18px 20px;
  box-shadow: 0 4px 12px rgba(160, 120, 80, 0.18);
  font-family: "Noto Sans JP", sans-serif;
  max-width: 420px;
  margin: 0 auto;
  font-size: 14px;
}
.ai-henna-box h3 {
  color: #8b4513;
  text-align: center;
  margin-bottom: 6px;
  font-size: 17px;
}
.ai-henna-box p {
  text-align: center;
  color: #5a4635;
  font-size: 13px;
  margin-bottom: 10px;
}
.ai-henna-box label {
  font-weight: bold;
  display: block;
  margin-top: 6px;
  color: #5b402e;
}
.ai-henna-box select,
.ai-henna-box input {
  width: 100%;
  padding: 6px;
  border: 1px solid #d2b899;
  border-radius: 6px;
  font-size: 13px;
  background: #fff;
  transition: box-shadow 0.2s;
}
.ai-henna-box select:focus,
.ai-henna-box input:focus {
  outline: none;
  box-shadow: 0 0 4px rgba(139, 69, 19, 0.3);
}
.ai-henna-box button {
  margin-top: 10px;
  background: linear-gradient(90deg, #b97a46, #a04e1c);
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 6px;
  padding: 8px;
  width: 100%;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.ai-henna-box button:hover {
  transform: translateY(-2px);
  box-shadow: 0 3px 6px rgba(160, 78, 28, 0.3);
}
.result-line {
  background: #f9f3e8;
  border-left: 5px solid #c78b4c;
  border-radius: 8px;
  padding: 10px 12px;
  color: #4b2a14;
  font-weight: 600;
  margin-top: 12px;
  line-height: 1.6em;
  animation: slideUp 0.6s ease;
  font-size: 13.5px;
}
/* アニメーション効果（結果が出るときにスライド表示） */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
/* 「...」の打ち込みアニメーション */
.typing { display: inline-block; font-weight: bold; }
.typing span { animation: blink 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0;}40%{opacity:1;} }
</style>

<!-- ================================
スクリプト（AI診断の動作ロジック）
================================ -->
<script>
// ① 使用量を計算する関数
function getPacketRecommendation(length, thickness) {
  var baseRange = "";
  if (length === "short") baseRange = "1~2パック(25g×1~2)";
  else if (length === "medium") baseRange = "約2パック(25g×2)";
  else if (length === "long") baseRange = "2~3パック(25g×2~3)";
  // 髪の太さによる補正
  if (thickness === "thin" && length !== "short") baseRange += "(少なめでOK)";
  else if (thickness === "thick") baseRange += "(多めに準備を)";
  return baseRange;
}

// ② メインカラーに応じてブレンド内容を決定
function getMixSuggestion(baseColor) {
  var mixData = {
    "ソフトブラック": { text: "ブラウンを混ぜると自然な艶が出ます。", ratio: "ソフトブラック8:ブラウン2" },
    "ダークブラウン": { text: "オレンジを足すと温かみのある色合いに。", ratio: "ダークブラウン7:オレンジ3" },
    "ブラウン": { text: "ソフトブラックを加えると上品な深みが増します。", ratio: "ブラウン7:ソフトブラック3" },
    "オレンジブラウン": { text: "ブラウンを混ぜると落ち着いたトーンに。", ratio: "オレンジブラウン8:ブラウン2" },
    "オレンジまたはブラウン": { text: "インディゴを混ぜると自然な黒褐色になります。", ratio: "オレンジ6:インディゴ4" }
  };
  // 登録されていない場合のデフォルトメッセージ
  return mixData[baseColor] || { text: "ブレンドで自分らしい色味を楽しみましょう！", ratio: "お好みで調整可" };
}

// ③ メイン関数：診断ボタン押下時の処理
function recommendHenna() {
  // 入力値の取得
  var age = parseInt(document.getElementById("age").value);
  var length = document.getElementById("length").value;
  var type = document.getElementById("type").value;
  var thickness = document.getElementById("thickness").value;
  var resultLine = document.getElementById("resultLine");

  // 入力チェック
  if (!age || !length || !type || !thickness) {
    alert("すべての項目を入力してください。");
    return;
  }

  // 髪色に基づいて基本カラーを決定
  var baseColor = "";
  if (type === "black") baseColor = "ソフトブラック";
  else if (type === "softblack") baseColor = "ダークブラウン";
  else if (type === "brown") baseColor = "ブラウン";
  else if (type === "darkbrown") baseColor = "オレンジブラウン";
  else if (type === "gray") baseColor = "オレンジまたはブラウン";

  // ブレンド情報を取得
  var mixResult = getMixSuggestion(baseColor);

  // 使用量を計算
  var usage = getPacketRecommendation(length, thickness);

  // 表示メッセージを複数パターンからランダムに選択
  var messages = [
    "おすすめカラーは「" + baseColor + "」。" + mixResult.text + " 配合比率の目安は " + mixResult.ratio + "。使用量は " + usage + "。",
    "診断結果：「" + baseColor + "」が最適です。" + mixResult.text + " 比率: " + mixResult.ratio + "。目安は " + usage + "。",
    "あなたの髪には「" + baseColor + "」がぴったり。" + mixResult.text + " 配合は " + mixResult.ratio + "。使用量は " + usage + "。",
    "最適カラー：「" + baseColor + "」。" + mixResult.text + " 推奨ブレンド比率 " + mixResult.ratio + "。目安は " + usage + "です。"
  ];
  var message = messages[Math.floor(Math.random() * messages.length)];

  // 「…」アニメーション表示後、結果を出す
  resultLine.hidden = false;
  resultLine.innerHTML = '<span class="typing"><span>.</span><span>.</span><span>.</span></span>';
  setTimeout(function() {
    resultLine.textContent = message;
  }, 1000);
}
</script>
